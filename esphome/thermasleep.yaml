#
# ThermaSleep → Home Assistant gateway
#
# Hardware: ESP32 dev kit + nRF24L01+ PA+LNA on socket adapter.
# See README.md for wiring and build instructions.
#
# Before flashing:
#   1. Copy secrets.yaml.example to secrets.yaml and fill it in.
#   2. Edit thermasleep_radio.h with channel / address / payloads from decode.md.
#   3. esphome run thermasleep.yaml
#

esphome:
  name: thermasleep-bridge
  friendly_name: ThermaSleep Bridge
  libraries:
    - "nRF24/RF24"
  includes:
    - thermasleep_radio.h
  on_boot:
    priority: -100
    then:
      - lambda: |-
          thermasleep_radio_setup();

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ThermaSleep-Bridge Fallback"
    password: !secret ap_password

captive_portal:

# Persisted counter — if Phase 2 revealed a counter byte, bump this and re-sync once.
# The radio code reads + writes id(tx_counter) directly.
globals:
  - id: tx_counter
    type: uint8_t
    restore_value: true
    initial_value: '0'

button:
  - platform: template
    name: "ThermaSleep Power"
    id: btn_power
    on_press:
      then:
        - lambda: |-
            thermasleep_send(THERMASLEEP_POWER, id(tx_counter));
        - globals.set:
            id: tx_counter
            value: !lambda 'return id(tx_counter) + 1;'

  - platform: template
    name: "ThermaSleep Up"
    id: btn_up
    on_press:
      then:
        - lambda: |-
            thermasleep_send(THERMASLEEP_UP, id(tx_counter));
        - globals.set:
            id: tx_counter
            value: !lambda 'return id(tx_counter) + 1;'

  - platform: template
    name: "ThermaSleep Down"
    id: btn_down
    on_press:
      then:
        - lambda: |-
            thermasleep_send(THERMASLEEP_DOWN, id(tx_counter));
        - globals.set:
            id: tx_counter
            value: !lambda 'return id(tx_counter) + 1;'

# Expose the counter as a diagnostic sensor so you can see it increment in HA.
sensor:
  - platform: template
    name: "ThermaSleep TX counter"
    entity_category: diagnostic
    lambda: 'return id(tx_counter);'
    update_interval: 10s
